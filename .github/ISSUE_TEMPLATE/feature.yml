name: Feature request
description: Suggest a new connector, capability, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: I find myself manually creating tasks every time ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Kind of request
      options:
        - New connector
        - Live artifact UI
        - Plugin command/skill
        - Performance / cost
        - Other
